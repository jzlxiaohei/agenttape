<svg width="760" height="180" viewBox="0 0 760 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AgentTape logo</title>
  <desc id="desc">AgentTape wordmark with a tape loop mark showing timeline nodes and replay motion.</desc>
