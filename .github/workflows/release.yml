name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0); the tag must already exist"
        required: true

permissions:
  contents: write

env:
  NODE_VERSION: "24"

jobs:
  release:
    name: Build and publish binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Build release binaries
        run: |
          set -euo pipefail
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.date=${DATE}"

          mkdir -p dist
          # Targets: GOOS/GOARCH pairs. Pure-Go build (CGO disabled) so all
          # platforms cross-compile from this one runner. The frontend dist is
          # built once on the first invocation and reused (stamp cache) after.
          for target in linux/amd64 darwin/arm64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            BIN="dist/agenttape"
            echo "==> Building ${GOOS}/${GOARCH}"
            CGO_ENABLED=0 GOOS="$GOOS" GOARCH="$GOARCH" \
              AGENTTAPE_BIN="$PWD/$BIN" \
              ./scripts/build.sh -trimpath -ldflags "$LDFLAGS"

            archive="agenttape_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
            tar -C dist -czf "dist/${archive}" agenttape
            rm -f "$BIN"
          done

          ( cd dist && sha256sum agenttape_*.tar.gz > SHA256SUMS )
          echo "==> Artifacts:"
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/agenttape_*.tar.gz
            dist/SHA256SUMS
